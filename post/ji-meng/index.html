          <div class="post-content">
            <p>幻梦？遥远的乌托邦。</p>
<p>秽土中生长的，是邪恶，是日复一日——</p>
<p>腐烂与残败的交响。</p>
<br />
<p>万亿世代中的璀璨星河，</p>
<p>如今化作黑白与谁成说？</p>
<p>幻觉中的晨雾是心上的纱帐，</p>
<p>虚无的悲叹，是为了消失的信仰。</p>
<br />
<p>违心的梦啊，月中无奈的捣药声。</p>
<p>清醒的恶啊，风里绝望的唱诗班。</p>
<p>眼前毫无血色的脸，</p>
<p>是我，是他，是万物的死与生。</p>
