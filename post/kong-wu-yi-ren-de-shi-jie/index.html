          <div class="post-content">
            <p>拂面吹过七海的悲风，<br>
奔向身后灯火通明的城，<br>
皎白色的海面的倒影，不是月光，<br>
是深海的尸骨、生前求生的梦。<br>
倾圮的高楼广厦、朱墙皇宫，<br>
又是见证了谁人的一生？</p>
<p>虚无，虚无！<br>
缥缈闪烁的霓虹，<br>
将萧瑟的长街照亮，<br>
徒然遥望、花火灿烂的远方，<br>
那是我无法归去的灵魂故乡。</p>
